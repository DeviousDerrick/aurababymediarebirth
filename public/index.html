<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AuraBaby Media</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      background: linear-gradient(135deg, #0a0015 0%, #1a0033 25%, #2d0052 50%, #1a0033 75%, #0f001a 100%);
      background-attachment: fixed;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ────────────────────────────────────
       MAIN CONTENT
    ──────────────────────────────────── */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 20px;
      width: 100%;
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00d4ff;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
      margin-bottom: 16px;
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 30px rgba(0, 212, 255, 0.8); transform: scale(1); }
      50% { text-shadow: 0 0 50px rgba(0, 212, 255, 1), 0 0 20px rgba(165, 94, 234, 0.6); transform: scale(1.02); }
    }

    .subtitle {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(176, 176, 176, 0.8);
      margin-bottom: 50px;
    }

    /* ────────────────────────────────────
       SERVER CARDS
    ──────────────────────────────────── */
    .server-grid {
      display: flex;
      gap: 28px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .server-card {
      width: 280px;
      background: rgba(13, 0, 30, 0.6);
      border: 2px solid #00d4ff;
      border-radius: 20px;
      padding: 32px 28px;
      cursor: pointer;
      text-decoration: none;
      color: #ffffff;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    .server-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff, transparent);
    }

    .server-card::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(0, 212, 255, 0.05);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .server-card:hover {
      transform: translateY(-14px) scale(1.05);
      box-shadow: 0 0 50px rgba(0, 212, 255, 0.5), 0 0 30px rgba(165, 94, 234, 0.3);
      border-color: #a55eea;
    }

    .server-card:hover::after {
      width: 500px;
      height: 500px;
    }

    .server-icon {
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.8));
      animation: iconPulse 2.5s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.6)); transform: scale(1); }
      50% { filter: drop-shadow(0 0 30px rgba(0, 212, 255, 1)); transform: scale(1.1); }
    }

    .server-name {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00d4ff;
    }

    .server-desc {
      font-size: 13px;
      font-weight: 600;
      color: rgba(176, 176, 176, 0.7);
      text-align: center;
      line-height: 1.7;
    }

    .server-badge {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 30px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.5);
      color: #00d4ff;
      margin-top: 4px;
    }

    .arrow {
      position: absolute;
      bottom: 16px;
      right: 18px;
      font-size: 20px;
      opacity: 0;
      transform: translateX(-8px);
      color: #00d4ff;
      transition: all 0.3s;
      font-weight: 900;
    }

    .server-card:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    @media (max-width: 620px) {
      .logo { font-size: 36px; }
      .server-card { width: 90%; max-width: 320px; }
    }
  </style>
</head>
<body>
  <!-- Main Content -->
  <div class="content">
    <div class="logo">
      AuraBaby Media
    </div>
    <div class="subtitle">Stream Your Favorites</div>

    <div class="server-grid">
      <a class="server-card" href="app.html">
        <div class="server-icon">🎬</div>
        <div class="server-name">Movie Mode</div>
        <div class="server-desc">Search movies & shows<br>with our player</div>
        <div class="server-badge">⚡ Built-In Player</div>
        <div class="arrow">→</div>
      </a>

      <a class="server-card" href="cinehub.html">
        <div class="server-icon">🌟</div>
        <div class="server-name">CineHub ⭐</div>
        <div class="server-desc">Full streaming site<br>through the proxy</div>
        <div class="server-badge">✨ Recommended</div>
        <div class="arrow">→</div>
      </a>
    </div>
  </div>
</body>
</html>
