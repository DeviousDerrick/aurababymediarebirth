<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>🥚 AuraBaby Easter Media 🐰</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      background: linear-gradient(180deg, #87CEEB 0%, #b7e4f7 16%, #d8f3dc 42%, #a8d5a2 68%, #52b788 100%);
      background-attachment: fixed;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ────────────────────────────────────
       EASTER NATURE ELEMENTS
    ──────────────────────────────────── */
    .sun {
      position: fixed;
      top: 30px;
      right: 60px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #fffde7 20%, #ffe566 55%, #ffcc00 100%);
      box-shadow: 0 0 50px rgba(255, 220, 0, 0.6);
      animation: sunPulse 4s ease-in-out infinite;
      z-index: 5;
      pointer-events: none;
    }

    @keyframes sunPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .cloud {
      position: fixed;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.85);
      pointer-events: none;
      z-index: 4;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
    }

    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
    }

    .c1 {
      width: 150px;
      height: 44px;
      top: 50px;
      left: 30px;
      animation: drift 20s ease-in-out infinite;
    }

    .c1::before {
      width: 76px;
      height: 76px;
      top: -36px;
      left: 14px;
    }

    .c1::after {
      width: 54px;
      height: 54px;
      top: -22px;
      left: 78px;
    }

    .c2 {
      width: 120px;
      height: 36px;
      top: 180px;
      right: 40px;
      animation: drift 24s ease-in-out infinite reverse;
    }

    .c2::before {
      width: 62px;
      height: 62px;
      top: -28px;
      left: 12px;
    }

    .c2::after {
      width: 44px;
      height: 44px;
      top: -16px;
      left: 62px;
    }

    @keyframes drift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(50px); }
    }

    /* Floating petals */
    .petal {
      position: fixed;
      font-size: 1.5rem;
      animation: fall var(--fd, 7s) linear infinite;
      opacity: 0.7;
      pointer-events: none;
      z-index: 3;
    }

    @keyframes fall {
      0% { transform: translateY(-30px) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(100vh) rotate(540deg); opacity: 0; }
    }

    .pt1 { left: 5%; --fd: 7s; animation-delay: 0s; }
    .pt2 { left: 15%; --fd: 8s; animation-delay: 1s; }
    .pt3 { left: 30%; --fd: 6s; animation-delay: 2s; }
    .pt4 { left: 50%; --fd: 9s; animation-delay: 0.5s; }
    .pt5 { left: 70%; --fd: 7.5s; animation-delay: 1.5s; }
    .pt6 { left: 85%; --fd: 8.5s; animation-delay: 0.8s; }

    /* Bees */
    .bee {
      position: fixed;
      font-size: 1.2rem;
      animation: beeDrift var(--bc, 16s) linear infinite, beeBob 1.2s ease-in-out infinite;
      pointer-events: none;
      z-index: 3;
    }

    @keyframes beeDrift {
      0% { left: -50px; top: var(--bt, 20%); opacity: 0; }
      4% { opacity: 1; }
      96% { opacity: 1; }
      100% { left: calc(100vw + 50px); top: var(--bt, 20%); opacity: 0; }
    }

    @keyframes beeBob {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }

    .be1 { --bt: 15%; --bc: 18s; }
    .be2 { --bt: 60%; --bc: 22s; animation-delay: 5s; }

    /* Butterflies */
    .butterfly {
      position: fixed;
      font-size: 1.4rem;
      animation: flutterAround var(--flutter-dur, 8s) ease-in-out infinite;
      pointer-events: none;
      z-index: 3;
    }

    @keyframes flutterAround {
      0% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.1) rotate(10deg); }
      50% { transform: translate(0, -60px) scale(0.9); }
      75% { transform: translate(-40px, -30px) scale(1.15) rotate(-15deg); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .bf1 { top: 20%; left: 10%; --flutter-dur: 7s; }
    .bf2 { top: 40%; right: 15%; --flutter-dur: 9s; animation-delay: 1s; }
    .bf3 { bottom: 30%; left: 20%; --flutter-dur: 8s; animation-delay: 2s; }

    /* ────────────────────────────────────
       MAIN CONTENT
    ──────────────────────────────────── */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 20px;
      width: 100%;
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1b4332;
      text-shadow: 0 0 20px rgba(64, 145, 108, 0.6), 4px 4px 0 rgba(255, 255, 255, 0.7);
      margin-bottom: 16px;
      animation: titleBounce 2s ease-in-out infinite;
    }

    @keyframes titleBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .logo .egg {
      font-size: 0.9em;
      animation: eggSpin 3s linear infinite;
      display: inline-block;
    }

    @keyframes eggSpin {
      0%, 100% { transform: rotateZ(0deg); }
      50% { transform: rotateZ(360deg); }
    }

    .subtitle {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(27, 67, 50, 0.65);
      margin-bottom: 50px;
    }

    /* ────────────────────────────────────
       SERVER CARDS
    ──────────────────────────────────── */
    .server-grid {
      display: flex;
      gap: 28px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .server-card {
      width: 280px;
      background: rgba(255, 255, 255, 0.92);
      border: 3px solid #52b788;
      border-radius: 20px;
      padding: 32px 28px;
      cursor: pointer;
      text-decoration: none;
      color: #1a1a2e;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 6px 30px rgba(82, 183, 136, 0.25);
      backdrop-filter: blur(10px);
    }

    .server-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #52b788, transparent);
    }

    .server-card::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(82, 183, 136, 0.08);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .server-card:hover {
      transform: translateY(-14px) scale(1.05);
      box-shadow: 0 12px 50px rgba(82, 183, 136, 0.5), 0 0 30px rgba(255, 200, 0, 0.3);
      border-color: #f9c74f;
    }

    .server-card:hover::after {
      width: 500px;
      height: 500px;
    }

    .server-icon {
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 0 15px rgba(82, 183, 136, 0.8));
      animation: iconBounce 2.5s ease-in-out infinite;
    }

    @keyframes iconBounce {
      0%, 100% { filter: drop-shadow(0 0 15px rgba(82, 183, 136, 0.6)); transform: scale(1); }
      50% { filter: drop-shadow(0 0 30px rgba(82, 183, 136, 1)); transform: scale(1.1); }
    }

    .server-name {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1b4332;
    }

    .server-desc {
      font-size: 13px;
      font-weight: 600;
      color: rgba(27, 67, 50, 0.6);
      text-align: center;
      line-height: 1.7;
    }

    .server-badge {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 30px;
      background: rgba(82, 183, 136, 0.15);
      border: 1px solid rgba(82, 183, 136, 0.5);
      color: #2d6a4f;
      margin-top: 4px;
    }

    .arrow {
      position: absolute;
      bottom: 16px;
      right: 18px;
      font-size: 20px;
      opacity: 0;
      transform: translateX(-8px);
      color: #52b788;
      transition: all 0.3s;
      font-weight: 900;
    }

    .server-card:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ────────────────────────────────────
       EASTER EGG HUNT LINK
    ──────────────────────────────────── */
    .egg-hunt-link {
      margin-top: 20px;
      padding: 16px 32px;
      background: linear-gradient(135deg, #f9c74f, #f3722c);
      color: #fff;
      border: none;
      border-radius: 30px;
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 25px rgba(249, 199, 79, 0.4);
      text-decoration: none;
      display: inline-block;
      animation: eggPulse 2s ease-in-out infinite;
    }

    @keyframes eggPulse {
      0%, 100% { box-shadow: 0 8px 25px rgba(249, 199, 79, 0.4); }
      50% { box-shadow: 0 12px 40px rgba(249, 199, 79, 0.8); }
    }

    .egg-hunt-link:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 50px rgba(249, 199, 79, 0.9);
    }

    /* Grass at bottom */
    .grass {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(to bottom, rgba(29, 53, 41, 0.3), #1b4332);
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .grass-flower {
      position: absolute;
      font-size: 2rem;
      animation: sway 3s ease-in-out infinite;
      transform-origin: bottom center;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    .gf1 { bottom: 20px; left: 10%; animation-delay: 0s; }
    .gf2 { bottom: 25px; left: 25%; animation-delay: 0.5s; }
    .gf3 { bottom: 20px; left: 45%; animation-delay: 1s; }
    .gf4 { bottom: 30px; left: 60%; animation-delay: 0.3s; }
    .gf5 { bottom: 20px; left: 75%; animation-delay: 0.8s; }
    .gf6 { bottom: 25px; right: 10%; animation-delay: 0.2s; }

    .bunny {
      position: fixed;
      bottom: 45px;
      font-size: 2.5rem;
      animation: hopAround 5s ease-in-out infinite;
      z-index: 3;
      left: 50%;
      margin-left: -20px;
    }

    @keyframes hopAround {
      0% { transform: translateX(-100px) translateY(0); }
      25% { transform: translateX(-50px) translateY(-30px); }
      50% { transform: translateX(0) translateY(0); }
      75% { transform: translateX(50px) translateY(-25px); }
      100% { transform: translateX(100px) translateY(0); }
    }

    @media (max-width: 620px) {
      .logo { font-size: 36px; }
      .server-card { width: 90%; max-width: 320px; }
      .c1 { display: none; }
      .pt3, .pt4, .pt5 { display: none; }
    }
  </style>
</head>

<div id="aurababy_egg_SmoothStone" onclick="showAurababyEggSmoothStone()"

  title="🥚 You found an Easter egg!">

    style="filter:drop-shadow(0 3px 8px rgba(0,0,0,0.15));">
    <defs>
      <radialGradient id="g57" cx="38.5%" cy="34%">
        <stop offset="0%" stop-color="#f3e5f5"/>
        <stop offset="100%" stop-color="#c77dff"/>
      </radialGradient>

  <circle cx="44.25" cy="89.06" r="4.99" fill="#4cc9f0" opacity="0.55"/>
    <ellipse cx="36.0" cy="39.4" rx="9.7" ry="16.9" fill="rgba(255,255,255,0.18)"/>
  </svg>
</div>
<script>
function showAurababyEggSmoothStone() {
  const overlay = document.createElement("div")
  overlay.style = `
    position:fixed;inset:0;background:rgba(27,67,50,.7);
    z-index:9999;display:flex;align-items:center;justify-content:center;font-family:sans-serif;
  `
  const box = document.createElement("div")
  box.style = `
    background:#fff;border-radius:20px;padding:28px 24px;
    max-width:340px;width:90%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.3);
  `
  box.innerHTML = `
    <div style="font-size:2.5em;margin-bottom:8px;">🥚</div>
    <div style="font-family:serif;font-size:1.5em;font-weight:900;color:#1b4332;margin-bottom:6px;">
      Pebble Egg
    </div>
    <div style="font-size:.8em;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#c77dff;background:#c77dff22;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:14px;">
      🌿 Common
    </div>
    <div style="font-size:.9em;color:rgba(27,67,50,.6);margin-bottom:12px;">
      Enter this code on the Aurababy Egg Hunt page!
    </div>
    <div id="ab_code_box_SmoothStone"
      style="background:#f0f8f4;border:2px solid #52b788;border-radius:10px;padding:12px;font-family:monospace;font-size:1.3em;font-weight:900;letter-spacing:2px;color:#1b4332;margin-bottom:14px;">
      SmoothStone
    </div>
    <button id="copyEggCode_SmoothStone"
      style="width:100%;padding:11px;background:linear-gradient(135deg,#1b4332,#40916c);color:#fff;font-size:1em;font-weight:800;letter-spacing:2px;border:none;border-radius:12px;cursor:pointer;margin-bottom:8px;">
      📋 Copy Code
    </button>
    <button id="closeEgg_SmoothStone"
      style="width:100%;padding:9px;background:rgba(27,67,50,.08);color:#2d6a4f;font-size:.9em;font-weight:800;border:2px solid rgba(64,145,108,.3);border-radius:12px;cursor:pointer;">
      ✕ Close
    </button>
  `
  overlay.appendChild(box)
  document.body.appendChild(overlay)
  document.getElementById("copyEggCode_SmoothStone").onclick = () => {
    navigator.clipboard.writeText("SmoothStone")
    document.getElementById("copyEggCode_SmoothStone").textContent = "✅ Copied!"
  }
  document.getElementById("closeEgg_SmoothStone").onclick = () => overlay.remove()
  overlay.onclick = e => { if (e.target === overlay) overlay.remove() }
}
</script>
