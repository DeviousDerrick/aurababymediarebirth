<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🥚 Player | AuraBaby Easter 🐰</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@800&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1a2e 0%, #0f3027 50%, #1b4332 100%);
      display: flex;
      flex-direction: column;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      overflow: hidden;
    }

    .player-header {
      background: rgba(27, 67, 50, 0.95);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #52b788;
      box-shadow: 0 0 30px rgba(82, 183, 136, 0.4);
      z-index: 1000;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .player-header h1 {
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      margin: 0;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 0 0 15px rgba(82, 183, 136, 0.8);
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .back-button {
      background: linear-gradient(135deg, #52b788, #95d5b2);
      color: white;
      border: none;
      padding: 9px 20px;
      border-radius: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(82, 183, 136, 0.5);
      white-space: nowrap;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
    }

    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(82, 183, 136, 0.8);
    }

    .source-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .source-label {
      color: #95d5b2;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(82, 183, 136, 0.6);
      font-weight: 900;
    }

    .source-btn {
      background: rgba(27, 67, 50, 0.9);
      color: #aaa;
      border: 2px solid #2d6a4f;
      padding: 7px 14px;
      border-radius: 10px;
      font-weight: 800;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .source-btn:hover {
      border-color: #52b788;
      color: #fff;
      box-shadow: 0 0 15px rgba(82, 183, 136, 0.5);
    }

    .source-btn.active {
      background: linear-gradient(135deg, #52b788, #95d5b2);
      color: white;
      border-color: #fff;
      box-shadow: 0 0 20px rgba(82, 183, 136, 0.8);
    }

    .source-btn.failed {
      border-color: #ff3232;
      color: #ff6464;
      opacity: 0.6;
    }

    .source-btn.loading-src {
      border-color: #f9c74f;
      color: #f9c74f;
      animation: srcPulse 1s ease-in-out infinite;
    }

    @keyframes srcPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(249, 199, 79, 0.4); }
      50% { box-shadow: 0 0 25px rgba(249, 199, 79, 0.9); }
    }

    .player-container {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 18px;
      text-align: center;
      font-weight: 800;
      z-index: 100;
      background: rgba(27, 67, 50, 0.85);
      padding: 30px 40px;
      border-radius: 15px;
      border: 3px solid #52b788;
      box-shadow: 0 0 40px rgba(82, 183, 136, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .loading-spinner {
      border: 5px solid #1b4332;
      border-top: 5px solid #f9c74f;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 15px auto;
      box-shadow: 0 0 30px rgba(249, 199, 79, 0.6);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading p {
      margin: 5px 0;
    }

    .loading .src-name {
      color: #95d5b2;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
    }

    .error-message {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(27, 67, 50, 0.97);
      color: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      border: 3px solid #f3722c;
      box-shadow: 0 0 40px rgba(243, 114, 44, 0.6);
      z-index: 101;
    }

    .error-message h2 {
      margin: 0 0 12px;
      font-size: 22px;
      font-family: 'Fredoka One', cursive;
    }

    .error-message p {
      margin: 8px 0;
      line-height: 1.6;
      font-size: 14px;
      color: #ccc;
    }

    .retry-button {
      background: linear-gradient(135deg, #52b788, #95d5b2);
      color: white;
      border: none;
      padding: 11px 28px;
      border-radius: 12px;
      font-weight: 800;
      font-family: 'Fredoka One', cursive;
      cursor: pointer;
      margin-top: 14px;
      transition: all 0.3s;
      font-size: 14px;
      text-transform: uppercase;
      box-shadow: 0 0 15px rgba(82, 183, 136, 0.4);
    }

    .retry-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(82, 183, 136, 0.8);
    }

    .hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(149, 213, 178, 0.6);
      font-size: 11px;
      pointer-events: none;
      z-index: 999;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(82, 183, 136, 0.3);
    }

    @media (max-width: 600px) {
      .player-header {
        padding: 10px 12px;
      }

      .player-header h1 {
        font-size: 13px;
      }

      .source-btn {
        font-size: 11px;
        padding: 6px 10px;
      }

      .source-label {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="player-header">
    <div class="header-left">
      <button class="back-button" onclick="window.history.back()">← BACK</button>
      <h1 id="playerTitle">🥚 Playing...</h1>
    </div>

    <div class="source-selector">
      <span class="source-label">📡 SOURCE:</span>
      <button class="source-btn" data-index="0">CinemaOS</button>
      <button class="source-btn" data-index="1">VidSrc CC</button>
      <button class="source-btn" data-index="2">VidSrc XYZ</button>
      <button class="source-btn" data-index="3">MoviesAPI</button>
      <button class="source-btn" data-index="4">VidLink</button>
      <button class="source-btn" data-index="5">AutoEmbed</button>
    </div>
  </div>

  <div class="player-container">
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>🥚 Loading your movie...</p>
      <p class="src-name" id="loadingSrcName"></p>
    </div>

    <div class="error-message" id="errorMessage">
      <h2>⚠️ All Sources Failed</h2>
      <p id="errorText">Unable to load any video source.</p>
      <p style="font-size:12px;">Try picking a different source above, or come back later. 🐰</p>
      <button class="retry-button" onclick="tryProvider(0)">🔄 Try Again</button>
      <button class="retry-button" onclick="window.history.back()" style="margin-left:8px; background: rgba(82, 183, 136, 0.3);">← Go Back</button>
    </div>

    <iframe
      id="player"
      allowfullscreen
      allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
      sandbox="allow-same-origin allow-scripts allow-forms allow-pointer-lock allow-popups allow-modals allow-orientation-lock allow-popups-to-escape-sandbox allow-presentation allow-top-navigation"
    ></iframe>
  </div>

  <div class="hint">🎬 N for next source &nbsp;·&nbsp; F for fullscreen &nbsp;·&nbsp; ESC to go back &nbsp;🥚</div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const type     = params.get("type");
    const id       = params.get("id");
    const season   = params.get("season") || 1;
    const episode  = params.get("episode") || 1;

    const titleEl       = document.getElementById("playerTitle");
    const loadingEl     = document.getElementById("loading");
    const loadingSrcEl  = document.getElementById("loadingSrcName");
    const errorEl       = document.getElementById("errorMessage");
    const errorTextEl   = document.getElementById("errorText");
    const playerFrame   = document.getElementById("player");
    const sourceBtns    = document.querySelectorAll(".source-btn");

    const PROVIDERS = [
      {
        name: "CinemaOS",
        url: () => type === "movie"
          ? `https://cinemaos.tech/player/${id}`
          : `https://cinemaos.tech/player/${id}/${season}/${episode}`
      },
      {
        name: "vidsrc.cc",
        url: () => type === "movie"
          ? `https://vidsrc.cc/v2/embed/movie/${id}`
          : `https://vidsrc.cc/v2/embed/tv/${id}/${season}/${episode}`
      },
      {
        name: "vidsrc.xyz",
        url: () => type === "movie"
          ? `https://vidsrc.xyz/embed/movie?tmdb=${id}`
          : `https://vidsrc.xyz/embed/tv?tmdb=${id}&season=${season}&episode=${episode}`
      },
      {
        name: "MoviesAPI",
        url: () => type === "movie"
          ? `https://moviesapi.club/movie/${id}`
          : `https://moviesapi.club/tv/${id}-${season}-${episode}`
      },
      {
        name: "VidLink",
        url: () => type === "movie"
          ? `https://vidlink.pro/movie/${id}?autoplay=true&title=true`
          : `https://vidlink.pro/tv/${id}/${season}/${episode}?autoplay=true&title=true`
      },
      {
        name: "AutoEmbed",
        url: () => type === "movie"
          ? `https://autoembed.co/movie/tmdb/${id}`
          : `https://autoembed.co/tv/tmdb/${id}-${season}-${episode}`
      }
    ];

    let currentIndex = 0;
    let loadTimer    = null;
    const failed     = new Set();

    titleEl.textContent = type === "tv"
      ? `🐰 S${season}E${episode} 🥚`
      : "🎬 NOW PLAYING 🥚";

    if (!type || !id) {
      showError("Missing required parameters.");
    } else {
      tryProvider(0);
    }

    sourceBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        tryProvider(parseInt(btn.dataset.index));
      });
    });

    function setButtonState(index, state) {
      sourceBtns.forEach(b => {
        b.classList.remove("active", "loading-src", "failed");
        if (failed.has(parseInt(b.dataset.index))) b.classList.add("failed");
      });
      if (sourceBtns[index]) {
        sourceBtns[index].classList.remove("failed");
        sourceBtns[index].classList.add(state);
      }
    }

    function tryProvider(index) {
      if (index >= PROVIDERS.length) {
        showError("All sources failed. Pick one manually above or try again later. 🐰");
        setButtonState(-1, "");
        return;
      }

      currentIndex = index;
      const provider = PROVIDERS[index];

      loadingEl.style.display   = "flex";
      errorEl.style.display     = "none";
      loadingSrcEl.textContent  = provider.name;

      setButtonState(index, "loading-src");

      if (loadTimer) clearTimeout(loadTimer);

      let loaded = false;

      const rawUrl = provider.url();
      const encoded = btoa(rawUrl).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      playerFrame.src = `/ocho/${encoded}`;

      playerFrame.onload = () => {
        loaded = true;
        clearTimeout(loadTimer);
        setButtonState(index, "active");
        setTimeout(() => loadingEl.style.display = "none", 700);
      };

      loadTimer = setTimeout(() => {
        if (!loaded) {
          failed.add(index);
          setButtonState(index, "failed");
          tryProvider(index + 1);
        }
      }, 12000);
    }

    function showError(msg) {
      loadingEl.style.display = "none";
      errorTextEl.textContent = msg;
      errorEl.style.display   = "block";
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") window.history.back();
      if (e.key === "f" || e.key === "F") playerFrame.requestFullscreen?.();
      if (e.key === "n" || e.key === "N") tryProvider(currentIndex + 1);
    });
  </script>
</body>
</html>
