<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Player | AuraBaby Media</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-cyan: #00d4ff;
      --secondary-blue: #00b4d8;
      --neon-pink: #f72585;
      --dark-bg: #0a0015;
      --dark-bg-2: #1a0033;
      --dark-bg-3: #2d0052;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--dark-bg) 0%, var(--dark-bg-2) 25%, var(--dark-bg-3) 50%, var(--dark-bg-2) 75%, var(--dark-bg) 100%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      overflow: hidden;
      position: relative;
    }

    /* ════════════════════════════════════
       SPACE ELEMENTS
    ════════════════════════════════════ */

    .planet {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: float 25s infinite ease-in-out;
    }

    .planet-sm {
      width: 100px;
      height: 100px;
      background: radial-gradient(circle at 30% 30%, #ff6b9d, #c44569);
      top: 10%;
      left: 5%;
      box-shadow: 0 0 50px rgba(255, 107, 157, 0.5);
      animation-delay: 0s;
    }

    .planet-md {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle at 30% 30%, #a29bfe, #6c5ce7);
      bottom: 20%;
      right: 8%;
      box-shadow: 0 0 70px rgba(162, 155, 254, 0.4);
      animation-delay: 3s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-30px) translateX(15px); }
      50% { transform: translateY(-20px) translateX(-20px); }
      75% { transform: translateY(-40px) translateX(10px); }
    }

    .star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      z-index: 0;
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .shooting-star {
      position: fixed;
      width: 1px;
      height: 1px;
      background: rgba(0, 212, 255, 0.9);
      border-radius: 50%;
      box-shadow: 0 0 10px 2px rgba(0, 212, 255, 0.6);
      animation: shoot 4s linear infinite;
      z-index: 0;
    }

    @keyframes shoot {
      0% { transform: translateX(0) translateY(0); opacity: 1; }
      70% { opacity: 1; }
      100% { transform: translateX(-300px) translateY(300px); opacity: 0; }
    }

    .shooting-star:nth-child(1) { top: 15%; right: 25%; animation-delay: 0s; }
    .shooting-star:nth-child(2) { top: 40%; right: 45%; animation-delay: 2s; }
    .shooting-star:nth-child(3) { top: 25%; right: 65%; animation-delay: 4s; }

    /* ════════════════════════════════════
       HEADER
    ════════════════════════════════════ */

    .player-header {
      background: rgba(10, 0, 30, 0.8);
      padding: 10px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid rgba(0, 212, 255, 0.3);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
      z-index: 1000;
      flex-wrap: wrap;
      gap: 8px;
      position: relative;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-header h1 {
      color: var(--primary-cyan);
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      margin: 0;
      text-transform: uppercase;
      text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .back-button {
      background: linear-gradient(135deg, var(--primary-cyan), var(--secondary-blue));
      color: var(--dark-bg);
      border: none;
      padding: 8px 18px;
      border-radius: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
    }

    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.7);
    }

    .source-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .source-label {
      color: var(--primary-cyan);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      font-weight: 900;
    }

    .source-btn {
      background: rgba(10, 0, 30, 0.9);
      color: rgba(255, 255, 255, 0.6);
      border: 2px solid rgba(0, 212, 255, 0.2);
      padding: 6px 12px;
      border-radius: 10px;
      font-weight: 800;
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .source-btn:hover {
      border-color: var(--primary-cyan);
      color: var(--primary-cyan);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
    }

    .source-btn.active {
      background: linear-gradient(135deg, var(--primary-cyan), var(--secondary-blue));
      color: var(--dark-bg);
      border-color: var(--white);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.7);
    }

    .source-btn.failed {
      border-color: #ff3232;
      color: #ff6464;
      opacity: 0.6;
    }

    .source-btn.loading-src {
      border-color: var(--primary-cyan);
      color: var(--primary-cyan);
      animation: srcPulse 1s ease-in-out infinite;
    }

    @keyframes srcPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 212, 255, 0.4); }
      50% { box-shadow: 0 0 25px rgba(0, 212, 255, 0.8); }
    }

    /* ════════════════════════════════════
       PLAYER CONTAINER
    ════════════════════════════════════ */

    .player-container {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    /* ════════════════════════════════════
       LOADING & ERROR
    ════════════════════════════════════ */

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--primary-cyan);
      text-align: center;
      font-weight: 800;
      z-index: 100;
      background: rgba(10, 0, 30, 0.95);
      padding: 28px 36px;
      border-radius: 15px;
      border: 2px solid var(--primary-cyan);
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 260px;
    }

    .loading-spinner {
      border: 5px solid rgba(0, 212, 255, 0.2);
      border-top: 5px solid var(--primary-cyan);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 14px auto;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading p {
      margin: 4px 0;
      font-size: 14px;
    }

    .loading .src-name {
      color: var(--secondary-blue);
      font-family: 'Fredoka One', cursive;
      font-size: 15px;
    }

    .loading .try-count {
      color: rgba(0, 212, 255, 0.5);
      font-size: 11px;
      margin-top: 4px;
    }

    .loading .sw-status {
      color: var(--primary-cyan);
      font-size: 10px;
      letter-spacing: 1px;
      margin-top: 3px;
    }

    .error-message {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 0, 30, 0.98);
      color: var(--white);
      padding: 28px;
      border-radius: 15px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      border: 2px solid #ff3232;
      box-shadow: 0 0 40px rgba(255, 50, 50, 0.5);
      z-index: 101;
    }

    .error-message h2 {
      margin: 0 0 10px;
      font-size: 22px;
      font-family: 'Fredoka One', cursive;
    }

    .error-message p {
      margin: 8px 0;
      line-height: 1.6;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .retry-button {
      background: linear-gradient(135deg, var(--primary-cyan), var(--secondary-blue));
      color: var(--dark-bg);
      border: none;
      padding: 10px 24px;
      border-radius: 12px;
      font-weight: 800;
      font-family: 'Fredoka One', cursive;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.3s;
      font-size: 13px;
      text-transform: uppercase;
    }

    .retry-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }

    .hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0, 212, 255, 0.5);
      font-size: 10px;
      pointer-events: none;
      z-index: 999;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    @media(max-width: 600px) {
      .player-header {
        padding: 8px 10px;
      }

      .player-header h1 {
        font-size: 12px;
      }

      .source-btn {
        font-size: 10px;
        padding: 5px 8px;
      }

      .source-label {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Space Background Elements -->
  <div class="star" style="top: 8%; left: 12%;"></div>
  <div class="star" style="top: 25%; left: 22%;"></div>
  <div class="star" style="top: 45%; left: 15%;"></div>
  <div class="star" style="top: 65%; left: 18%;"></div>
  <div class="star" style="top: 80%; left: 10%;"></div>
  <div class="star" style="top: 15%; right: 18%;"></div>
  <div class="star" style="top: 35%; right: 25%;"></div>
  <div class="star" style="top: 55%; right: 20%;"></div>
  <div class="star" style="top: 75%; right: 15%;"></div>

  <div class="planet planet-sm"></div>
  <div class="planet planet-md"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <div class="player-header">
    <div class="header-left">
      <button class="back-button" onclick="window.history.back()">← BACK</button>
      <h1 id="playerTitle">Playing...</h1>
    </div>
    <div class="source-selector">
      <span class="source-label">📡 SOURCE:</span>
    </div>
  </div>

  <div class="player-container">
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>🎬 Loading...</p>
      <p class="src-name" id="loadingSrcName">Connecting...</p>
      <p class="try-count" id="tryCount"></p>
      <p class="sw-status" id="swStatus"></p>
    </div>
    <div class="error-message" id="errorMessage">
      <h2>⚠️ All Sources Failed</h2>
      <p id="errorText">Unable to load any video source.</p>
      <p style="font-size: 12px;">Try another source above or come back later.</p>
      <button class="retry-button" onclick="tryProvider(0)">🔄 Try Again</button>
      <button class="retry-button" onclick="window.history.back()" style="margin-left: 8px; background: rgba(0, 212, 255, 0.2);">← Go Back</button>
    </div>
    <iframe
      id="player"
      allowfullscreen
      allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
      sandbox="allow-same-origin allow-scripts allow-forms allow-pointer-lock allow-popups allow-modals allow-orientation-lock allow-popups-to-escape-sandbox allow-presentation allow-top-navigation"
    ></iframe>
  </div>

  <div class="hint">🎬 N = next source &nbsp;·&nbsp; F = fullscreen &nbsp;·&nbsp; ESC = back</div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const type    = params.get("type");
    const id      = params.get("id");
    const season  = params.get("season")  || 1;
    const episode = params.get("episode") || 1;

    function ochoProxy(rawUrl) {
      const enc = btoa(unescape(encodeURIComponent(rawUrl)))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
      return `/ocho/${enc}`;
    }

    const PROVIDERS = type === "movie" ? [
      { name: "CinemaOS",   url: () => `https://cinemaos.tech/player/${id}` },
      { name: "VidSrc.me",  url: () => `https://vidsrc.me/embed/movie?tmdb=${id}` },
      { name: "Embed.su",   url: () => `https://embed.su/embed/movie/${id}` },
      { name: "VidLink",    url: () => `https://vidlink.pro/movie/${id}?autoplay=true` },
      { name: "2Embed",     url: () => `https://www.2embed.cc/embed/${id}` },
      { name: "VidSrc.icu", url: () => `https://vidsrc.icu/embed/movie/${id}` },
      { name: "SuperEmbed", url: () => `https://multiembed.mov/?video_id=${id}&tmdb=1` },
      { name: "AutoEmbed",  url: () => `https://autoembed.co/movie/tmdb/${id}` },
      { name: "VidSrc.xyz", url: () => `https://vidsrc.xyz/embed/movie?tmdb=${id}` },
      { name: "MoviesAPI",  url: () => `https://moviesapi.club/movie/${id}` },
    ] : [
      { name: "CinemaOS",   url: () => `https://cinemaos.tech/player/${id}/${season}/${episode}` },
      { name: "VidSrc.me",  url: () => `https://vidsrc.me/embed/tv?tmdb=${id}&season=${season}&episode=${episode}` },
      { name: "Embed.su",   url: () => `https://embed.su/embed/tv/${id}/${season}/${episode}` },
      { name: "VidLink",    url: () => `https://vidlink.pro/tv/${id}/${season}/${episode}?autoplay=true` },
      { name: "2Embed",     url: () => `https://www.2embed.cc/embedtv/${id}&s=${season}&e=${episode}` },
      { name: "VidSrc.icu", url: () => `https://vidsrc.icu/embed/tv/${id}/${season}/${episode}` },
      { name: "SuperEmbed", url: () => `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${season}&e=${episode}` },
      { name: "AutoEmbed",  url: () => `https://autoembed.co/tv/tmdb/${id}-${season}-${episode}` },
      { name: "VidSrc.xyz", url: () => `https://vidsrc.xyz/embed/tv?tmdb=${id}&season=${season}&episode=${episode}` },
      { name: "MoviesAPI",  url: () => `https://moviesapi.club/tv/${id}-${season}-${episode}` },
    ];

    const titleEl      = document.getElementById("playerTitle");
    const loadingEl    = document.getElementById("loading");
    const loadingSrcEl = document.getElementById("loadingSrcName");
    const tryCountEl   = document.getElementById("tryCount");
    const swStatusEl   = document.getElementById("swStatus");
    const errorEl      = document.getElementById("errorMessage");
    const errorTextEl  = document.getElementById("errorText");
    const playerFrame  = document.getElementById("player");
    const sourceBar    = document.querySelector(".source-selector");

    PROVIDERS.forEach((p, i) => {
      const btn = document.createElement("button");
      btn.className = "source-btn";
      btn.dataset.index = i;
      btn.textContent = p.name;
      btn.addEventListener("click", () => tryProvider(i));
      sourceBar.appendChild(btn);
    });

    let currentIndex = 0;
    let loadTimer    = null;
    const failed     = new Set();

    titleEl.textContent = type === "tv"
      ? `🎬 S${season}E${episode}`
      : "🎬 NOW PLAYING";

    async function registerMediaSW() {
      if (!('serviceWorker' in navigator)) {
        swStatusEl.textContent = '⚠ SW not supported';
        return false;
      }
      try {
        swStatusEl.textContent = '🔄 Activating stream...';
        const reg = await navigator.serviceWorker.register('/media-sw.js', { scope: '/' });

        if (reg.active) {
          swStatusEl.textContent = '✅ Stream active';
          return true;
        }

        return new Promise(resolve => {
          const sw = reg.installing || reg.waiting;
          if (!sw) { swStatusEl.textContent = '✅ Stream active'; resolve(true); return; }
          sw.addEventListener('statechange', function() {
            if (this.state === 'activated') {
              swStatusEl.textContent = '✅ Stream active';
              resolve(true);
            }
          });
          setTimeout(() => {
            swStatusEl.textContent = '⚡ Starting...';
            resolve(true);
          }, 3000);
        });
      } catch(err) {
        console.warn('Media SW failed:', err.message);
        swStatusEl.textContent = '⚠ Limited (no SW)';
        return false;
      }
    }

    (async function init() {
      if (!type || !id) { showError("Missing required parameters."); return; }
      await registerMediaSW();
      tryProvider(0);
    })();

    function setButtonState(index, state) {
      document.querySelectorAll(".source-btn").forEach(b => {
        b.classList.remove("active", "loading-src", "failed");
        if (failed.has(parseInt(b.dataset.index))) b.classList.add("failed");
      });
      const t = document.querySelector(`.source-btn[data-index="${index}"]`);
      if (t) { t.classList.remove("failed"); t.classList.add(state); }
    }

    function tryProvider(index) {
      if (index >= PROVIDERS.length) {
        showError("All sources failed. Pick one above manually.");
        return;
      }

      currentIndex = index;
      const p = PROVIDERS[index];

      loadingEl.style.display  = "flex";
      errorEl.style.display    = "none";
      loadingSrcEl.textContent = p.name;
      tryCountEl.textContent   = `Source ${index + 1} of ${PROVIDERS.length}`;

      setButtonState(index, "loading-src");
      if (loadTimer) clearTimeout(loadTimer);

      let loaded = false;
      playerFrame.src = ochoProxy(p.url());

      playerFrame.onload = () => {
        loaded = true;
        clearTimeout(loadTimer);
        setButtonState(index, "active");
        setTimeout(() => { loadingEl.style.display = "none"; }, 600);
      };

      const timeout = (p.name === "CinemaOS" && type === "tv") ? 20000 : 12000;
      loadTimer = setTimeout(() => {
        if (!loaded) {
          failed.add(index);
          setButtonState(index, "failed");
          tryProvider(index + 1);
        }
      }, timeout);
    }

    function showError(msg) {
      loadingEl.style.display = "none";
      errorTextEl.textContent = msg;
      errorEl.style.display   = "block";
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") window.history.back();
      if (e.key === "f" || e.key === "F") playerFrame.requestFullscreen?.();
      if (e.key === "n" || e.key === "N") tryProvider(currentIndex + 1);
    });
  </script>
</body>
</html>
